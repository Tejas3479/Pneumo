apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: celery-worker
          image: pneumodetect:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: storage-volume
              mountPath: /app/data
              subPath: data
            - name: storage-volume
              mountPath: /app/models
              subPath: models
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: pneumodetect-data
